name: Deploy to GitHub Pages

# Deploys the POS web app to GitHub Pages, publishing ONLY the files the app
# actually serves. Everything else (online_index.html, the .gs Apps Script,
# .tgz, temp .txt, PowerShell, docs, .idea, .claude, etc.) is left out.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (only required files)
        run: |
          mkdir -p _site
          cp index.html \
             app.js \
             database.js \
             styles.css \
             html2pdf.bundle.min.js \
             _site/
          echo "Published files:" && ls -la _site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
